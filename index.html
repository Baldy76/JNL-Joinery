<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>D.N.L Joinery</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f5f5f4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .ios-input { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; width: 100%; font-size: 15px; outline: none; transition: all 0.2s; }
        .ios-input:focus { background: #fff; border-color: #8b5a2b; box-shadow: 0 0 0 3px rgba(139, 90, 43, 0.15); }
        .view-section { display: none; }
        .view-section.active { display: block; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 40px); }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E"); background-position: right 0.75rem center; background-repeat: no-repeat; background-size: 1.2em 1.2em; padding-right: 2.5rem; }
        /* Modal Backgrounds */
        .modal-bg { display: none; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .modal-bg.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-stone-100 h-screen flex flex-col overflow-hidden text-stone-800">

    <header class="bg-white/80 backdrop-blur-md shadow-sm pt-safe pb-3 px-4 flex justify-center items-center z-10 shrink-0 border-b border-stone-200">
        <img src="logo.png" alt="D.N.L Logo" class="h-10 object-contain mr-3">
        <h1 class="text-xl font-extrabold text-[#4a3728] tracking-widest uppercase">D·N·L Joinery</h1>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-28 md:max-w-2xl md:mx-auto md:w-full space-y-6">
        
        <section id="view-dashboard" class="view-section active">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-3xl font-black text-[#4a3728]">My Jobs</h2>
            </div>
            
            <div class="bg-gradient-to-r from-stone-800 to-stone-900 p-5 rounded-3xl shadow-lg mb-6 text-white flex justify-between items-center">
                <div>
                    <p class="text-stone-400 text-xs font-bold uppercase tracking-wider mb-1">Total Paid This Month</p>
                    <p class="text-3xl font-black text-emerald-400" id="monthlyRevenue">£0.00</p>
                </div>
                <div class="w-12 h-12 rounded-full bg-stone-700 flex items-center justify-center border-2 border-emerald-400 shadow-[0_0_15px_rgba(52,211,153,0.3)]">
                    <i class="fa-solid fa-chart-pie text-xl text-emerald-300"></i>
                </div>
            </div>

            <div id="quoteList" class="space-y-4"></div>
        </section>

        <section id="view-new-quote" class="view-section">
            <h2 class="text-3xl font-black text-[#4a3728] mb-6"><i class="fa-solid fa-file-pen text-[#8b5a2b] mr-2"></i>New Document</h2>
            
            <div class="bg-white p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-stone-100 mb-6 space-y-4 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                <div>
                    <label class="text-xs font-bold text-stone-500 uppercase ml-1 tracking-wider">Customer Name</label>
                    <input type="text" id="custName" list="clientList" class="ios-input mt-2" placeholder="e.g. John Smith" onchange="fillClientDetails()">
                    <datalist id="clientList"></datalist>
                </div>
                <div class="flex space-x-4">
                    <div class="flex-1">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1 tracking-wider">Phone</label>
                        <input type="tel" id="custPhone" class="ios-input mt-2" placeholder="07...">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1 tracking-wider">Email</label>
                        <input type="email" id="custEmail" class="ios-input mt-2" placeholder="@">
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-end">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1 tracking-wider">Job Description</label>
                        <button onclick="startDictation()" class="text-blue-500 bg-blue-50 px-3 py-1 rounded-full text-xs font-bold hover:bg-blue-100 transition"><i class="fa-solid fa-microphone mr-1"></i> Dictate</button>
                    </div>
                    <textarea id="jobDesc" class="ios-input mt-2" rows="2" placeholder="Describe the job..."></textarea>
                </div>
                
                <div class="pt-2 border-t border-stone-50">
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="handlePhotoUpload(event)">
                    <button onclick="document.getElementById('cameraInput').click()" class="w-full bg-stone-100 text-stone-600 font-bold py-3 rounded-xl border-2 border-dashed border-stone-300 active:bg-stone-200 transition flex items-center justify-center">
                        <i class="fa-solid fa-camera mr-2"></i> Attach Site Snapshot
                    </button>
                    <img id="photoPreview" class="mt-3 rounded-xl max-h-32 mx-auto hidden shadow-md border border-stone-200">
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-stone-100 mb-6 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-amber-500"></div>
                <div class="flex justify-between items-end border-b border-stone-100 pb-3 mb-4">
                    <h3 class="font-extrabold text-stone-700 text-lg"><i class="fa-solid fa-toolbox text-amber-500 mr-2"></i>Materials</h3>
                    <button onclick="openCatalog()" class="text-amber-600 bg-amber-50 px-3 py-1 rounded-full text-xs font-bold border border-amber-100 shadow-sm active:scale-95"><i class="fa-solid fa-book-open mr-1"></i> Catalog</button>
                </div>
                <div class="flex justify-end mb-2">
                    <label class="text-xs font-bold text-stone-500 mr-2 uppercase mt-1">Markup %</label>
                    <input type="number" id="materialMarkup" class="ios-input w-20 py-1 px-2 text-center text-sm font-bold text-amber-700 calc-trigger" placeholder="0">
                </div>
                <div id="materialsContainer" class="space-y-3"></div>
                <button onclick="addMaterialRow()" class="mt-5 text-sm font-bold text-amber-700 bg-amber-50 hover:bg-amber-100 py-3 px-4 rounded-xl w-full transition transform active:scale-95 border border-amber-200">
                    <i class="fa-solid fa-plus mr-1"></i> Add Manual Row
                </button>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-stone-100 mb-6 space-y-5 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-emerald-500"></div>
                <h3 class="font-extrabold text-stone-700 text-lg border-b border-stone-100 pb-3"><i class="fa-solid fa-stopwatch text-emerald-500 mr-2"></i>Labour & Extra Costs</h3>
                <div class="flex space-x-4 bg-emerald-50/50 p-4 rounded-2xl border border-emerald-100">
                    <div class="flex-1">
                        <label class="text-xs font-bold text-emerald-800 uppercase ml-1">Est. Hours</label>
                        <input type="number" id="labourHours" class="ios-input mt-2 border-emerald-200 calc-trigger" placeholder="0">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-emerald-800 uppercase ml-1">Rate (/hr)</label>
                        <input type="number" id="labourRate" class="ios-input mt-2 border-emerald-200 calc-trigger" placeholder="0.00">
                    </div>
                </div>
                <div class="flex space-x-4">
                    <div class="flex-1">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1 tracking-wider">Fuel (£)</label>
                        <input type="number" id="costFuel" class="ios-input mt-2 calc-trigger" placeholder="0.00">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1 tracking-wider">Misc (£)</label>
                        <input type="number" id="costMisc" class="ios-input mt-2 calc-trigger" placeholder="0.00">
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-stone-100 mb-6 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-purple-500"></div>
                <h3 class="font-extrabold text-stone-700 text-lg border-b border-stone-100 pb-3 mb-4"><i class="fa-solid fa-pen-nib text-purple-500 mr-2"></i>Client Approval</h3>
                <button onclick="openSignature()" class="w-full bg-purple-50 text-purple-700 font-bold py-3 rounded-xl border border-purple-200 active:bg-purple-100 transition flex items-center justify-center">
                    <i class="fa-solid fa-signature mr-2"></i> Collect Digital Signature
                </button>
                <img id="signaturePreview" class="mt-3 bg-white rounded-xl mx-auto hidden shadow-sm border border-stone-200 w-full max-h-24 object-contain">
            </div>

            <div class="bg-gradient-to-br from-[#4a3728] to-[#5c4033] p-6 rounded-3xl shadow-xl text-white mb-6 border border-[#6b4c3a]">
                <div class="flex justify-between items-center mb-5">
                    <span class="text-lg font-medium text-stone-200">Grand Total</span>
                    <span class="text-4xl font-black tracking-tight" id="displayTotal">£0.00</span>
                </div>
                <button onclick="saveAndGenerate()" class="w-full bg-white text-[#4a3728] font-black py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all text-lg flex items-center justify-center">
                    <i class="fa-solid fa-file-pdf text-red-500 mr-2 text-xl"></i> Save & Create PDF
                </button>
            </div>
        </section>

        <section id="view-admin" class="view-section">
            <h2 class="text-3xl font-black text-[#4a3728] mb-6"><i class="fa-solid fa-gear text-stone-500 mr-2"></i>Settings</h2>
            
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100 space-y-4 mb-6">
                <h3 class="font-bold text-stone-700 text-lg border-b border-stone-100 pb-3"><i class="fa-solid fa-sliders text-blue-500 mr-2"></i>App Preferences</h3>
                <div class="flex space-x-4">
                    <div class="flex-1">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1">Default Rate (£/hr)</label>
                        <input type="number" id="defaultRate" class="ios-input mt-2" placeholder="25.00">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1">Default Markup (%)</label>
                        <input type="number" id="defaultMarkup" class="ios-input mt-2" placeholder="20">
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100 space-y-4 mb-6">
                <h3 class="font-bold text-stone-700 text-lg border-b border-stone-100 pb-3"><i class="fa-solid fa-building-columns text-emerald-500 mr-2"></i>Bank Details</h3>
                <div>
                    <label class="text-xs font-bold text-stone-500 uppercase ml-1">Account Name</label>
                    <input type="text" id="bankName" class="ios-input mt-2">
                </div>
                <div class="flex space-x-4">
                    <div class="flex-1">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1">Sort Code</label>
                        <input type="text" id="bankSort" class="ios-input mt-2">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-stone-500 uppercase ml-1">Account No.</label>
                        <input type="text" id="bankAcc" class="ios-input mt-2">
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-[#8b5a2b] text-white font-bold py-4 rounded-2xl transform active:scale-95 transition mt-4 shadow-md">
                    <i class="fa-solid fa-floppy-disk mr-2"></i>Save Settings
                </button>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-red-100 space-y-4">
                <h3 class="font-bold text-red-600 text-lg border-b border-red-50 pb-3"><i class="fa-solid fa-triangle-exclamation mr-2"></i>Danger Zone</h3>
                <button onclick="clearDatabase()" class="w-full bg-red-50 text-red-600 border border-red-200 font-bold py-4 rounded-2xl transform active:scale-95 transition">
                    Wipe Database (Delete Quotes & Clients)
                </button>
                <p class="text-center text-xs font-bold text-stone-400 mt-4 tracking-widest uppercase">Version 1.9 (Pro)</p>
            </div>
        </section>
    </main>

    <div id="catalogModal" class="modal-bg fixed inset-0 z-50 items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-6 relative flex flex-col max-h-[80vh]">
            <button onclick="closeCatalog()" class="absolute top-4 right-4 w-8 h-8 bg-stone-100 rounded-full text-stone-500 font-bold"><i class="fa-solid fa-times"></i></button>
            <h3 class="text-xl font-black text-stone-800 mb-4"><i class="fa-solid fa-book-open text-amber-500 mr-2"></i>Timber Yard Catalog</h3>
            <div id="catalogList" class="overflow-y-auto space-y-2 flex-1 pr-2">
                </div>
        </div>
    </div>

    <div id="sigModal" class="modal-bg fixed inset-0 z-50 items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-6 relative">
            <h3 class="text-xl font-black text-stone-800 mb-2"><i class="fa-solid fa-pen-nib text-purple-500 mr-2"></i>Client Signature</h3>
            <p class="text-xs text-stone-500 mb-4">Please sign below to approve the works and costs.</p>
            <div class="border-2 border-dashed border-stone-300 rounded-xl bg-stone-50 overflow-hidden mb-4">
                <canvas id="sigCanvas" class="w-full h-48 touch-none"></canvas>
            </div>
            <div class="flex space-x-3">
                <button onclick="clearSignature()" class="flex-1 bg-stone-200 text-stone-700 font-bold py-3 rounded-xl active:bg-stone-300"><i class="fa-solid fa-eraser mr-1"></i> Clear</button>
                <button onclick="saveSignature()" class="flex-1 bg-purple-600 text-white font-bold py-3 rounded-xl active:bg-purple-700 shadow-md"><i class="fa-solid fa-check mr-1"></i> Confirm</button>
            </div>
            <button onclick="closeSignature()" class="w-full mt-3 text-sm text-stone-500 font-bold py-2">Cancel</button>
        </div>
    </div>

    <nav class="bg-white/90 backdrop-blur-lg border-t border-stone-200 flex justify-around items-center pb-safe pt-2 absolute bottom-0 w-full z-20 shrink-0 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('dashboard')" class="flex flex-col items-center p-2 w-full text-stone-400 hover:text-[#4a3728] tab-btn active-tab transition-colors">
            <i class="fa-solid fa-folder-open text-xl mb-1"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">Jobs</span>
        </button>
        <button onclick="switchTab('new-quote')" class="flex flex-col items-center p-2 w-full text-stone-400 hover:text-[#8b5a2b] tab-btn transition-colors relative">
            <div class="bg-[#8b5a2b] text-white w-12 h-12 flex items-center justify-center rounded-full shadow-lg transform -translate-y-4 border-4 border-stone-100 active:scale-95 transition-transform">
                <i class="fa-solid fa-plus text-xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-wider -mt-3 text-[#8b5a2b]">New</span>
        </button>
        <button onclick="switchTab('admin')" class="flex flex-col items-center p-2 w-full text-stone-400 hover:text-[#4a3728] tab-btn transition-colors">
            <i class="fa-solid fa-gear text-xl mb-1"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">Admin</span>
        </button>
    </nav>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
